<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClientPro Hub v1.9 — PDF & Document Engine</title>
<style>
:root{--blue:#0057B8;--orange:#FF7A00;--dark:#1f2937;--bg:#f5f7fa;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--green:#16a34a;--red:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}.app-shell{display:flex;min-height:100vh}.sidebar{width:280px;background:var(--dark);color:white;position:fixed;top:0;bottom:0;left:0;padding:22px;overflow:auto}.brand{display:flex;align-items:center;gap:12px;margin-bottom:24px}.logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--orange));display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}.brand h1{font-size:22px;margin:0}.brand p{font-size:12px;margin:2px 0;color:#cbd5e1}.nav button{width:100%;border:0;background:transparent;color:#e5e7eb;text-align:left;padding:12px 14px;border-radius:10px;font-weight:700;cursor:pointer}.nav button:hover,.nav button.active{background:var(--blue)}main{margin-left:280px;width:calc(100% - 280px)}header{height:68px;background:white;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;position:sticky;top:0;z-index:10}.version{background:#eaf2ff;color:var(--blue);padding:4px 8px;border-radius:999px;font-size:12px;font-weight:800}header input{margin-left:auto;max-width:360px;width:35vw;padding:10px;border:1px solid var(--border);border-radius:9px}#app{padding:24px}.page-head{display:flex;justify-content:space-between;gap:16px;margin-bottom:18px}.page-head h2{margin:0;font-size:28px}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:16px}.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;margin-top:16px}.card,.module{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.04)}.module{cursor:pointer;min-height:112px}.module:hover{border-color:#93c5fd;transform:translateY(-2px)}.metric{font-size:30px;font-weight:900;margin-top:8px}.status{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;background:#dbeafe;color:#1d4ed8}.green{background:#dcfce7;color:#166534}.orange{background:#ffedd5;color:#9a3412}.row,.row3{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:12px}.row3{grid-template-columns:repeat(3,1fr)}input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-family:inherit}textarea{min-height:90px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button,.primary{border:0;border-radius:9px;padding:10px 14px;font-weight:800;cursor:pointer}.primary{background:var(--orange);color:white}.secondary{background:white;color:var(--text);border:1px solid var(--border)}.danger{background:var(--red);color:white}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left;font-size:14px}tr.click{cursor:pointer}tr.click:hover{background:#f8fafc}.note{border-left:4px solid var(--blue);background:#eff6ff;border-radius:12px;padding:14px;margin-top:12px}.doc-shell{background:white;border:1px solid var(--border);border-radius:16px;padding:18px;margin-top:16px}.document-preview{background:white;border:1px solid #cbd5e1;box-shadow:0 12px 36px rgba(15,23,42,.13);max-width:900px;margin:0 auto;padding:42px;color:var(--text)}.doc-top{display:flex;justify-content:space-between;gap:24px;border-bottom:3px solid var(--blue);padding-bottom:18px;margin-bottom:22px}.doc-logo{width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--orange));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px}.doc-company{display:flex;gap:14px}.doc-company h2{margin:0;color:var(--blue)}.doc-title{text-align:right}.doc-title h1{margin:0;font-size:28px}.doc-badge{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:800;margin-top:6px}.doc-meta{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}.doc-box{border:1px solid var(--border);border-radius:12px;padding:14px;background:#f8fafc}.doc-table th{background:var(--blue);color:white}.doc-summary{margin-left:auto;max-width:360px;margin-top:18px}.doc-summary div{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}.doc-summary .grand{font-size:20px;font-weight:900;color:var(--blue)}.signature{display:flex;justify-content:space-between;margin-top:52px;gap:30px}.sig-line{border-top:1px solid var(--text);padding-top:8px;width:240px;text-align:center}.terms{margin-top:24px;font-size:13px;color:#4b5563}.doc-footer{margin-top:26px;border-top:1px solid var(--border);padding-top:12px;font-size:12px;color:var(--muted);text-align:center}.do-table th{background:#1f2937!important}@media print{body{background:#fff}.sidebar,header,.no-print,.page-head,.cards,.grid,.grid2,.card:not(.print-card){display:none!important}main{margin:0;width:100%}#app{padding:0}.doc-shell{border:0;padding:0;margin:0}.document-preview{box-shadow:none;border:0;max-width:100%;padding:18px}.document-preview *{-webkit-print-color-adjust:exact;print-color-adjust:exact}}@media(max-width:900px){.sidebar{transform:translateX(-100%);transition:.25s}.sidebar.open{transform:none}main{margin-left:0;width:100%}header input{display:none}.grid,.grid2,.row,.row3,.doc-meta{grid-template-columns:1fr}.doc-top{flex-direction:column}.doc-title{text-align:left}.document-preview{padding:20px}}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">CP</div><div><h1>ClientPro Hub</h1><p>v1.9 PDF Engine</p></div></div>
    <nav id="nav" class="nav"></nav>
  </aside>
  <main>
    <header><strong id="title">Dashboard</strong><span class="version">v1.9 — PDF & Document Engine</span><input id="search" placeholder="Search customers, invoices, projects..."><button class="primary" onclick="go('commerce')">+ Create</button></header>
    <section id="app"></section>
  </main>
</div>
<script>
const DB={init(){const d={customers:[],projects:[],websiteProjects:[],tickets:[],assets:[],vendors:[],employees:[],documents:[],quotations:[],deliveryOrders:[],invoices:[],payments:[],receipts:[],expenses:[],auditLogs:[],settings:{company:'K&M TechSpire Solution',ssm:'NS0313320-D',email:'mohan@knmtechspiresolution.com',phone:'',address:'Seremban, Negeri Sembilan, Malaysia',currency:'RM',bank:'Bank details to be configured',terms:'All payments should be made according to agreed terms. This document is system generated by ClientPro Hub.',preparedBy:'Mohan Samugom'}};Object.keys(d).forEach(k=>{if(!localStorage.getItem('cph_'+k))localStorage.setItem('cph_'+k,JSON.stringify(d[k]))})},get(k){return JSON.parse(localStorage.getItem('cph_'+k)||'[]')},set(k,v){localStorage.setItem('cph_'+k,JSON.stringify(v))},add(k,item){const rows=this.get(k);const rec={...item,id:(crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random()+''),createdAt:new Date().toISOString()};rows.push(rec);this.set(k,rows);return rec},update(k,id,patch){this.set(k,this.get(k).map(x=>x.id===id?{...x,...patch,updatedAt:new Date().toISOString()}:x))},clear(){Object.keys(localStorage).filter(k=>k.startsWith('cph_')).forEach(k=>localStorage.removeItem(k));this.init()}};DB.init();
const app=document.getElementById('app'),title=document.getElementById('title'),nav=document.getElementById('nav');
const modules=[['dashboard','Dashboard'],['crm','Customer CRM'],['commerce','Commerce Core'],['projects','Project Management'],['website','Website Builder'],['support','Support Center'],['assets','Asset Management'],['vendors','Vendor Management'],['employees','Employee Management'],['documents','Document Repository'],['reports','Reports & Analytics'],['audit','Audit Logs'],['settings','Settings']];
const desc={dashboard:'Business overview and launch center.',crm:'Customers, profiles and linked projects.',commerce:'Quotation → DO → Invoice → Payment → Receipt with PDF preview.',projects:'CRM-linked projects and profitability.',website:'Website projects, domains and deployment.',support:'Tickets linked to customers/projects.',assets:'Assets linked to customers.',vendors:'Vendors and procurement.',employees:'Employees and assignments.',documents:'Document records and templates.',reports:'Relationship and financial reports.',audit:'Activity logs.',settings:'Company profile and document settings.'};
function money(v){return 'RM '+(Number(v)||0).toFixed(2)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function head(t,d,a=''){return `<div class="page-head"><div><h2>${t}</h2><p class="muted">${d}</p></div>${a}</div>`}function table(t,rows,cols){return `<div class="card" style="margin-top:16px"><h3>${t}</h3><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows||`<tr><td colspan="${cols.length}">No records yet.</td></tr>`}</tbody></table></div>`}function custName(id){return DB.get('customers').find(c=>c.id===id)?.name||'Unlinked / Manual'}function projName(id){return DB.get('projects').find(p=>p.id===id)?.name||'-'}function custOpts(){return `<option value="">-- Select CRM Customer --</option>`+DB.get('customers').map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}function projOpts(){return `<option value="">-- Select Project --</option>`+DB.get('projects').map(p=>`<option value="${p.id}">${esc(p.name)} - ${esc(custName(p.customerId))}</option>`).join('')}function stamp(k,prefix){return prefix+'-'+new Date().toISOString().slice(0,10).replaceAll('-','')+'-'+String(DB.get(k).length+1).padStart(3,'0')}function log(m,a,r){DB.add('auditLogs',{module:m,action:a,record:r})}
function go(p){title.textContent=modules.find(m=>m[0]===p)?.[1]||'Dashboard';document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.p===p));(pages[p]||pages.dashboard)()}nav.innerHTML=modules.map((m,i)=>`<button data-p="${m[0]}" class="${i?'':'active'}" onclick="go('${m[0]}')">${m[1]}</button>`).join('');
function cards(){return `<div class="cards">${modules.map(m=>`<div class="module" onclick="go('${m[0]}')"><h3>${m[1]}</h3><span class="status">Open Module</span><p class="muted">${desc[m[0]]}</p></div>`).join('')}</div>`}
const pages={};
pages.dashboard=()=>{let c=DB.get('customers'),p=DB.get('projects'),q=DB.get('quotations'),i=DB.get('invoices'),r=DB.get('receipts'),rev=i.reduce((s,x)=>s+(+x.grandTotal||0),0);app.innerHTML=head('Welcome Mohan','ClientPro Hub v1.9 PDF & Document Engine.',`<button class="primary" onclick="go('commerce')">Commerce Core</button>`)+`<div class="grid"><div class="card"><span class="muted">Customers</span><div class="metric">${c.length}</div></div><div class="card"><span class="muted">Projects</span><div class="metric">${p.length}</div></div><div class="card"><span class="muted">Quotations</span><div class="metric">${q.length}</div></div><div class="card"><span class="muted">Revenue</span><div class="metric">${money(rev)}</div></div></div><h3 style="margin-top:22px">All Modules</h3>`+cards()};
pages.crm=()=>{let cs=DB.get('customers'),ps=DB.get('projects'),ins=DB.get('invoices');app.innerHTML=head('Customer CRM','Customers are connected to projects and commerce documents.')+`<div class="card"><h3>Add Customer</h3><div class="row"><input id="cName" placeholder="Customer / Company Name"><input id="cPhone" placeholder="Phone"></div><div class="row"><input id="cEmail" placeholder="Email"><select id="cStatus"><option>Lead</option><option>Prospect</option><option>Active</option><option>VIP</option></select></div><div class="actions"><button class="primary" onclick="addCustomer()">Save Customer</button></div></div>`+table('Customer List - click row for profile',cs.map(c=>`<tr class="click" onclick="viewCustomer('${c.id}')"><td>${esc(c.name)}</td><td>${esc(c.phone||'-')}</td><td>${esc(c.email||'-')}</td><td>${ps.filter(p=>p.customerId===c.id).length}</td><td>${money(ins.filter(i=>i.customerId===c.id).reduce((s,i)=>s+(+i.grandTotal||0),0))}</td></tr>`).join(''),['Name','Phone','Email','Projects','Revenue'])};
function addCustomer(){if(!cName.value.trim())return alert('Enter customer name');DB.add('customers',{name:cName.value,phone:cPhone.value,email:cEmail.value,status:cStatus.value});log('CRM','Customer created',cName.value);pages.crm()}function viewCustomer(id){let c=DB.get('customers').find(x=>x.id===id),ps=DB.get('projects').filter(p=>p.customerId===id),qs=DB.get('quotations').filter(q=>q.customerId===id),ins=DB.get('invoices').filter(i=>i.customerId===id),rs=DB.get('receipts').filter(r=>r.customerId===id);app.innerHTML=head('Customer Profile: '+esc(c.name),'360° customer view.',`<button class="secondary" onclick="pages.crm()">Back</button>`)+`<div class="grid"><div class="card"><span class="muted">Projects</span><div class="metric">${ps.length}</div></div><div class="card"><span class="muted">Quotations</span><div class="metric">${qs.length}</div></div><div class="card"><span class="muted">Invoices</span><div class="metric">${ins.length}</div></div><div class="card"><span class="muted">Receipts</span><div class="metric">${rs.length}</div></div></div><div class="card" style="margin-top:16px"><button class="primary" onclick="go('projects');setTimeout(()=>pCustomer.value='${id}',30)">+ Project</button> <button class="secondary" onclick="go('commerce');setTimeout(()=>qCustomer.value='${id}',30)">+ Quotation</button> <button class="secondary" onclick="showStatement('${id}')">Statement</button></div><div id="docArea"></div>`+table('Linked Projects',ps.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(p.type)}</td><td>${esc(p.status)}</td><td>${money(p.budget)}</td></tr>`).join(''),['Project','Type','Status','Budget'])}
pages.projects=()=>{let rows=DB.get('projects');app.innerHTML=head('Project Management','Create projects linked to CRM customers.')+`<div class="card"><h3>Create Project</h3><div class="row3"><input id="pName" placeholder="Project Name"><select id="pCustomer">${custOpts()}</select><select id="pType"><option>Website</option><option>App</option><option>CCTV</option><option>Networking</option><option>Consultancy</option></select></div><div class="row"><input id="pBudget" type="number" placeholder="Budget"><input id="pCost" type="number" placeholder="Cost"></div><div class="actions"><button class="primary" onclick="addProject()">Save Project</button></div></div>`+table('Project List',rows.map(p=>`<tr><td>${esc(p.name)}</td><td>${esc(custName(p.customerId))}</td><td>${esc(p.type)}</td><td>${money(p.budget)}</td><td>${money((+p.budget||0)-(+p.cost||0))}</td></tr>`).join(''),['Project','CRM Customer','Type','Budget','Profit'])};function addProject(){if(!pName.value.trim()||!pCustomer.value)return alert('Enter project and customer');DB.add('projects',{name:pName.value,customerId:pCustomer.value,type:pType.value,status:'Active',budget:pBudget.value,cost:pCost.value});pages.projects()}
pages.commerce=()=>{app.innerHTML=head('Commerce Core','Create, preview and print official K&M TechSpire documents.')+`<div class="grid"><div class="card"><span class="muted">Quotations</span><div class="metric">${DB.get('quotations').length}</div></div><div class="card"><span class="muted">Delivery Orders</span><div class="metric">${DB.get('deliveryOrders').length}</div></div><div class="card"><span class="muted">Invoices</span><div class="metric">${DB.get('invoices').length}</div></div><div class="card"><span class="muted">Receipts</span><div class="metric">${DB.get('receipts').length}</div></div></div><div class="grid2" style="margin-top:16px"><div class="card"><h3>Create Quotation</h3><div class="row"><select id="qCustomer">${custOpts()}</select><select id="qProject">${projOpts()}</select></div><div class="row3"><input id="qDesc" placeholder="Description"><input id="qAmount" type="number" placeholder="Subtotal"><input id="qDiscount" type="number" placeholder="Discount"></div><div class="row3"><input id="qTax" type="number" value="0" placeholder="Tax %"><select id="qStatus"><option>Draft</option><option>Sent</option><option>Approved</option></select><input id="qRemark" placeholder="Remark"></div><button class="primary" onclick="addQuotation()" style="margin-top:12px">Save Quotation</button></div><div class="card"><h3>Record Invoice Payment</h3><select id="payInvoice">${invoiceOpts()}</select><div class="row"><input id="payAmount" type="number" placeholder="Payment Amount"><select id="payMethod"><option>Bank Transfer</option><option>Cash</option><option>DuitNow</option><option>Cheque</option></select></div><input id="payRef" placeholder="Reference No" style="margin-top:12px"><button class="primary" onclick="recordPayment()" style="margin-top:12px">Save Payment + Receipt</button></div></div>`+commerceTables()+`<div id="docArea"></div>`};
function invoiceOpts(){return `<option value="">-- Select Invoice --</option>`+DB.get('invoices').filter(i=>i.status!=='Paid').map(i=>`<option value="${i.id}">${i.no} - ${custName(i.customerId)} - Balance ${money(i.balance)}</option>`).join('')}function addQuotation(){if(!qCustomer.value)return alert('Select CRM customer');let sub=+qAmount.value||0,disc=+qDiscount.value||0,taxRate=+qTax.value||0,taxable=Math.max(sub-disc,0),tax=taxable*taxRate/100,total=taxable+tax,no=stamp('quotations','QT'),rec=DB.add('quotations',{no,customerId:qCustomer.value,projectId:qProject.value,desc:qDesc.value||'Service / Product',subtotal:sub,discount:disc,taxRate,taxAmount:tax,grandTotal:total,status:qStatus.value,remark:qRemark.value,date:new Date().toLocaleDateString()});log('Commerce','Quotation created',no);pages.commerce();setTimeout(()=>showDoc('quotation',rec.id),50)}function approveQuote(id){DB.update('quotations',id,{status:'Approved'});let q=DB.get('quotations').find(x=>x.id===id),doNo=stamp('deliveryOrders','DO'),d=DB.add('deliveryOrders',{no:doNo,quotationId:id,customerId:q.customerId,projectId:q.projectId,desc:q.desc,status:'Issued',date:new Date().toLocaleDateString(),unit:'Lot',remarks:'Delivered as per quotation'});pages.commerce();setTimeout(()=>showDoc('delivery',d.id),50)}function createInvoiceFromQuote(id){let q=DB.get('quotations').find(x=>x.id===id),no=stamp('invoices','INV'),inv=DB.add('invoices',{no,quotationId:id,customerId:q.customerId,projectId:q.projectId,desc:q.desc,subtotal:q.subtotal,discount:q.discount,taxRate:q.taxRate,taxAmount:q.taxAmount,grandTotal:q.grandTotal,paid:0,balance:q.grandTotal,status:'Issued',date:new Date().toLocaleDateString()});pages.commerce();setTimeout(()=>showDoc('invoice',inv.id),50)}function recordPayment(){let inv=DB.get('invoices').find(x=>x.id===payInvoice.value);if(!inv)return alert('Select invoice');let amt=+payAmount.value||0;if(amt<=0)return alert('Enter amount');let paid=(+inv.paid||0)+amt,balance=Math.max((+inv.grandTotal||0)-paid,0),status=balance<=0?'Paid':'Partially Paid';DB.update('invoices',inv.id,{paid,balance,status});let pay=DB.add('payments',{no:stamp('payments','PAY'),invoiceId:inv.id,customerId:inv.customerId,amount:amt,method:payMethod.value,reference:payRef.value,date:new Date().toLocaleDateString()}),r=DB.add('receipts',{no:stamp('receipts','RCP'),paymentId:pay.id,invoiceId:inv.id,customerId:inv.customerId,amount:amt,method:payMethod.value,reference:payRef.value,status:'Issued',date:new Date().toLocaleDateString()});pages.commerce();setTimeout(()=>showDoc('receipt',r.id),50)}
function commerceTables(){let q=DB.get('quotations'),d=DB.get('deliveryOrders'),i=DB.get('invoices'),r=DB.get('receipts');return table('Quotation List',q.map(x=>`<tr><td>${x.no}</td><td>${custName(x.customerId)}</td><td>${projName(x.projectId)}</td><td>${money(x.grandTotal)}</td><td>${x.status}</td><td><button class="secondary" onclick="approveQuote('${x.id}')">Approve + DO</button> <button class="secondary" onclick="createInvoiceFromQuote('${x.id}')">Invoice</button> <button class="secondary" onclick="showDoc('quotation','${x.id}')">Preview</button></td></tr>`).join(''),['No','Customer','Project','Total','Status','Actions'])+table('Delivery Orders',d.map(x=>`<tr><td>${x.no}</td><td>${custName(x.customerId)}</td><td>${x.status}</td><td><button class="secondary" onclick="showDoc('delivery','${x.id}')">Preview</button></td></tr>`).join(''),['No','Customer','Status','Actions'])+table('Invoices',i.map(x=>`<tr><td>${x.no}</td><td>${custName(x.customerId)}</td><td>${money(x.grandTotal)}</td><td>${money(x.paid)}</td><td>${money(x.balance)}</td><td>${x.status}</td><td><button class="secondary" onclick="showDoc('invoice','${x.id}')">Preview</button></td></tr>`).join(''),['No','Customer','Total','Paid','Balance','Status','Actions'])+table('Official Receipts',r.map(x=>`<tr><td>${x.no}</td><td>${custName(x.customerId)}</td><td>${money(x.amount)}</td><td>${x.status}</td><td><button class="secondary" onclick="showDoc('receipt','${x.id}')">Preview</button></td></tr>`).join(''),['No','Customer','Amount','Status','Actions'])}
function docRec(type,id){return DB.get({quotation:'quotations',delivery:'deliveryOrders',invoice:'invoices',receipt:'receipts'}[type]).find(x=>x.id===id)}function docTitle(type){return {quotation:'QUOTATION',delivery:'DELIVERY ORDER',invoice:'INVOICE',receipt:'OFFICIAL RECEIPT',statement:'CUSTOMER STATEMENT'}[type]||'DOCUMENT'}function showDoc(type,id){let rec=docRec(type,id);if(!rec)return alert('Document not found');let area=document.getElementById('docArea');if(!area){pages.commerce();area=document.getElementById('docArea')}area.innerHTML=`<div class="doc-shell print-card"><div class="no-print actions"><button class="primary" onclick="window.print()">Print Document</button><button class="secondary" onclick="shareWhatsApp('${type}','${rec.no}')">WhatsApp Message</button></div>${documentHtml(type,rec)}</div>`;area.scrollIntoView({behavior:'smooth'})}function documentHtml(type,rec){let s=DB.get('settings'),c=DB.get('customers').find(x=>x.id===rec.customerId)||{},isDO=type==='delivery',subtotal=rec.subtotal||rec.grandTotal||rec.amount||0,discount=rec.discount||0,tax=rec.taxAmount||0,total=rec.grandTotal||rec.amount||0;return `<div class="document-preview"><div class="doc-top"><div class="doc-company"><div class="doc-logo">CP</div><div><h2>${esc(s.company)}</h2><p>Reg No: ${esc(s.ssm)}<br>Email: ${esc(s.email)}<br>${esc(s.address)}</p></div></div><div class="doc-title"><h1>${docTitle(type)}</h1><p><b>No:</b> ${esc(rec.no)}<br><b>Date:</b> ${esc(rec.date||new Date().toLocaleDateString())}</p><span class="doc-badge">${esc(rec.status||'Issued')}</span></div></div><div class="doc-meta"><div class="doc-box"><b>Customer</b><p>${esc(c.name||custName(rec.customerId))}<br>${esc(c.email||'')}<br>${esc(c.phone||'')}</p></div><div class="doc-box"><b>Project / Reference</b><p>${esc(projName(rec.projectId))}<br>Prepared By: ${esc(s.preparedBy||'-')}</p></div></div>${isDO?doItems(rec):normalItems(rec,subtotal)}${isDO?'':summary(type,rec,subtotal,discount,tax,total)}<div class="terms"><b>${isDO?'Delivery Notes':'Terms & Conditions'}</b><p>${isDO?'Goods/services received in good condition unless stated otherwise.':'All payments should be made according to agreed terms. This document is system generated by ClientPro Hub.'}</p></div><div class="signature"><div class="sig-line">Customer / Receiver</div><div class="sig-line">Authorised Signature</div></div><div class="doc-footer">Generated by ClientPro Hub • ${esc(s.company)}</div></div>`}function normalItems(rec,subtotal){return `<table class="doc-table"><thead><tr><th>No</th><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody><tr><td>1</td><td>${esc(rec.desc||'Service / Product')}</td><td>1</td><td>${money(subtotal)}</td><td>${money(subtotal)}</td></tr></tbody></table>`}function doItems(rec){return `<table class="doc-table do-table"><thead><tr><th>No</th><th>Item / Description</th><th>Quantity</th><th>Unit</th><th>Remarks</th></tr></thead><tbody><tr><td>1</td><td>${esc(rec.desc||'Delivered Item')}</td><td>1</td><td>${esc(rec.unit||'Lot')}</td><td>${esc(rec.remarks||'')}</td></tr></tbody></table>`}function summary(type,rec,subtotal,discount,tax,total){return `<div class="doc-summary"><div><span>Subtotal</span><b>${money(subtotal)}</b></div><div><span>Discount</span><b>${money(discount)}</b></div><div><span>Tax</span><b>${money(tax)}</b></div><div class="grand"><span>Grand Total</span><b>${money(total)}</b></div>${type==='invoice'?`<div><span>Paid</span><b>${money(rec.paid)}</b></div><div><span>Balance</span><b>${money(rec.balance)}</b></div>`:''}${type==='receipt'?`<div><span>Payment Method</span><b>${esc(rec.method||'-')}</b></div><div><span>Reference</span><b>${esc(rec.reference||'-')}</b></div>`:''}</div>`}function shareWhatsApp(type,no){window.open('https://wa.me/?text='+encodeURIComponent(`Dear Customer, please find your ${docTitle(type)} ${no} from K&M TechSpire Solution.`),'_blank')}
function showStatement(customerId){go('reports');setTimeout(()=>{let c=DB.get('customers').find(x=>x.id===customerId),invs=DB.get('invoices').filter(i=>i.customerId===customerId),rs=DB.get('receipts').filter(r=>r.customerId===customerId),ti=invs.reduce((s,i)=>s+(+i.grandTotal||0),0),tp=rs.reduce((s,r)=>s+(+r.amount||0),0);docArea.innerHTML=`<div class="doc-shell print-card"><div class="no-print actions"><button class="primary" onclick="window.print()">Print Statement</button></div><div class="document-preview"><div class="doc-top"><div class="doc-company"><div class="doc-logo">CP</div><div><h2>K&M TechSpire Solution</h2><p>Customer Statement</p></div></div><div class="doc-title"><h1>CUSTOMER STATEMENT</h1><p>${new Date().toLocaleDateString()}</p></div></div><div class="doc-box"><b>Customer</b><p>${esc(c?.name||'-')}</p></div><table class="doc-table"><thead><tr><th>Date</th><th>Document</th><th>Debit</th><th>Credit</th></tr></thead><tbody>${invs.map(i=>`<tr><td>${i.date||'-'}</td><td>${i.no}</td><td>${money(i.grandTotal)}</td><td>-</td></tr>`).join('')}${rs.map(r=>`<tr><td>${r.date||'-'}</td><td>${r.no}</td><td>-</td><td>${money(r.amount)}</td></tr>`).join('')}</tbody></table><div class="doc-summary"><div><span>Total Invoices</span><b>${money(ti)}</b></div><div><span>Total Payments</span><b>${money(tp)}</b></div><div class="grand"><span>Balance</span><b>${money(ti-tp)}</b></div></div></div></div>`;docArea.scrollIntoView({behavior:'smooth'})},50)}
pages.website=()=>basic('Website Builder','websiteProjects',['name','customerId','projectId','domain'],`<div class="row3"><input id="bName" placeholder="Website Project"><select id="bCustomer">${custOpts()}</select><select id="bProject">${projOpts()}</select></div><input id="bDomain" placeholder="Domain" style="margin-top:12px"><button class="primary" onclick="DB.add('websiteProjects',{name:bName.value,customerId:bCustomer.value,projectId:bProject.value,domain:bDomain.value});go('website')">Save</button>`);pages.support=()=>basic('Support Center','tickets',['subject','customerId','projectId','status'],`<div class="row3"><input id="bName" placeholder="Subject"><select id="bCustomer">${custOpts()}</select><select id="bProject">${projOpts()}</select></div><button class="primary" onclick="DB.add('tickets',{subject:bName.value,customerId:bCustomer.value,projectId:bProject.value,status:'Open'});go('support')">Save</button>`);pages.assets=()=>basic('Asset Management','assets',['name','customerId','serial','status'],`<div class="row3"><input id="bName" placeholder="Asset"><select id="bCustomer">${custOpts()}</select><input id="bSerial" placeholder="Serial"></div><button class="primary" onclick="DB.add('assets',{name:bName.value,customerId:bCustomer.value,serial:bSerial.value,status:'Available'});go('assets')">Save</button>`);pages.vendors=()=>basic('Vendor Management','vendors',['company','contact','phone'],`<div class="row3"><input id="bCompany" placeholder="Company"><input id="bContact" placeholder="Contact"><input id="bPhone" placeholder="Phone"></div><button class="primary" onclick="DB.add('vendors',{company:bCompany.value,contact:bContact.value,phone:bPhone.value});go('vendors')">Save</button>`);pages.employees=()=>basic('Employee Management','employees',['name','role','status'],`<div class="row3"><input id="bName" placeholder="Name"><input id="bRole" placeholder="Role"><select id="bStatus"><option>Active</option><option>Inactive</option></select></div><button class="primary" onclick="DB.add('employees',{name:bName.value,role:bRole.value,status:bStatus.value});go('employees')">Save</button>`);pages.documents=()=>basic('Document Repository','documents',['name','customerId','type'],`<div class="row3"><input id="bName" placeholder="Document"><select id="bCustomer">${custOpts()}</select><select id="bType"><option>Customer</option><option>Project</option><option>Finance</option></select></div><button class="primary" onclick="DB.add('documents',{name:bName.value,customerId:bCustomer.value,type:bType.value});go('documents')">Save</button>`);function basic(t,key,cols,form){let rows=DB.get(key);app.innerHTML=head(t,desc[key]||'Manage records')+`<div class="card"><h3>Add Record</h3>${form}</div>`+table(t+' List',rows.map(r=>`<tr>${cols.map(c=>`<td>${esc(c==='customerId'?custName(r[c]):c==='projectId'?projName(r[c]):r[c]||'-')}</td>`).join('')}</tr>`).join(''),cols.map(c=>c[0].toUpperCase()+c.slice(1)))}pages.reports=()=>{let cs=DB.get('customers'),invs=DB.get('invoices'),rs=DB.get('receipts'),ti=invs.reduce((s,i)=>s+(+i.grandTotal||0),0),tp=rs.reduce((s,r)=>s+(+r.amount||0),0);app.innerHTML=head('Reports & Analytics','CRM relationship and financial reports.')+`<div class="grid"><div class="card"><span class="muted">Invoices</span><div class="metric">${money(ti)}</div></div><div class="card"><span class="muted">Collections</span><div class="metric">${money(tp)}</div></div><div class="card"><span class="muted">Outstanding</span><div class="metric">${money(ti-tp)}</div></div><div class="card"><span class="muted">Customers</span><div class="metric">${cs.length}</div></div></div>`+table('CRM → Project Relationship',cs.map(c=>`<tr><td>${esc(c.name)}</td><td>${DB.get('projects').filter(p=>p.customerId===c.id).length}</td><td>${DB.get('quotations').filter(q=>q.customerId===c.id).length}</td><td>${DB.get('invoices').filter(i=>i.customerId===c.id).length}</td><td><button class="secondary" onclick="showStatement('${c.id}')">Statement</button></td></tr>`).join(''),['Customer','Projects','Quotations','Invoices','Statement'])+`<div id="docArea"></div>`};pages.audit=()=>{let l=DB.get('auditLogs').slice().reverse();app.innerHTML=head('Audit Logs','System activity tracking.')+table('Activity Logs',l.map(x=>`<tr><td>${new Date(x.createdAt).toLocaleString()}</td><td>${esc(x.module)}</td><td>${esc(x.action)}</td><td>${esc(x.record)}</td></tr>`).join(''),['Date','Module','Action','Record'])};pages.settings=()=>{let s=DB.get('settings');app.innerHTML=head('Settings','Company profile and document settings.')+`<div class="grid2"><div class="card"><h3>Company Profile</h3><div class="row"><input id="setCompany" value="${esc(s.company)}"><input id="setSsm" value="${esc(s.ssm)}"></div><div class="row"><input id="setEmail" value="${esc(s.email)}"><input id="setCurrency" value="${esc(s.currency)}"></div><textarea id="setAddress" style="margin-top:12px">${esc(s.address)}</textarea><div class="actions"><button class="primary" onclick="saveSettings()">Save Settings</button></div></div><div class="card"><h3>System Tools</h3><button class="secondary" onclick="go('audit')">Audit Logs</button> <button class="danger" onclick="if(confirm('Clear local data?')){DB.clear();go('dashboard')}">Clear Local Data</button></div></div>`};function saveSettings(){DB.set('settings',{...DB.get('settings'),company:setCompany.value,ssm:setSsm.value,email:setEmail.value,currency:setCurrency.value,address:setAddress.value});alert('Settings saved')}go('dashboard');
</script>
</body></html>
