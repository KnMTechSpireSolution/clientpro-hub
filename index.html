<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClientPro Hub v2.0 — Login Fix</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="loginScreen" class="login">
    <div class="login-card">
      <div class="logo" style="margin:auto">CP</div>
      <h1>ClientPro Hub</h1>
      <p>K&M TechSpire Solution</p>
      <input id="loginUser" value="demo" placeholder="User ID" aria-label="User ID" />
      <input id="loginPass" type="password" value="demo" placeholder="Password" aria-label="Password" />
      <button class="primary" style="width:100%;margin-top:14px" onclick="loginApp()">Login Demo</button>
      <button class="secondary" style="width:100%;margin-top:8px" onclick="skipLogin()">Skip Login</button>
      <small>Demo login: demo / demo</small>
      <p id="loginError" class="login-error"></p>
    </div>
  </div>

  <div id="appShell" class="app-shell hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="logo">CP</div>
        <div>
          <h1>ClientPro Hub</h1>
          <p>v2.0 Login Fix</p>
        </div>
      </div>
      <nav id="nav" class="nav"></nav>
    </aside>

    <main>
      <header>
        <button class="menu-btn" onclick="sidebar.classList.toggle('open')">☰</button>
        <strong id="title">Dashboard</strong>
        <span class="version">v2.0 Login Fix</span>
        <input placeholder="Search..." />
        <button class="primary" onclick="go('quotationCreate')">+ Quotation</button>
      </header>
      <section id="app"></section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
